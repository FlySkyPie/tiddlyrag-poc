services:
  gitea:
    image: docker.gitea.com/gitea:1.26.1
    restart: always
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
      - GITEA__repository__DISABLE_HTTP_GIT=false
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__ENABLE_BASIC_AUTHENTICATION=ture
      - GITEA__migrations__ALLOW_LOCALNETWORKS=true
    ports:
      - "8080:3000"
      - "2222:22" 
  pgvector:
    image: docker.io/pgvector/pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - pgvector:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  gitea-data:
  pgvector:
