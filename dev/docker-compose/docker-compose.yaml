services:
  pgvector:
    image: docker.io/pgvector/pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - pgvector:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  embedding:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b8248
    restart: always
    devices:
      - /dev/dri/:/dev/dri/
    ports:
      - 8080:8080
    entrypoint: /app/llama-server
    volumes:
      - embedding-cache:/root/.cache/llama.cpp
    environment:
      - LLAMA_ARG_HF_REPO=Qwen/Qwen3-Embedding-4B-GGUF
      - LLAMA_ARG_HF_FILE=Qwen3-Embedding-4B-Q6_K.gguf
      - LLAMA_ARG_EMBEDDINGS=enabled
      - LLAMA_ARG_POOLING=mean
      - LLAMA_ARG_CTX_SIZE=20480
      - LLAMA_ARG_WEBUI=disabled
      - LLAMA_ARG_N_GPU_LAYERS=all
      - LLAMA_ARG_BATCH=8192
      - LLAMA_ARG_UBATCH=4096
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 20s
      retries: 3
  
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:0.21.2-hotfix-3
    environment:
      - MCP_AUTO_OPEN_ENABLED=false
      - DANGEROUSLY_OMIT_AUTH=true
      - HOST=0.0.0.0
    network_mode: "host"     

volumes:
  pgvector:
  embedding-cache:
  llm-cache:

